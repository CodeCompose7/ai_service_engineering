<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>통합 어시스턴트</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 0 auto;
           padding: 16px; }
    header { display: flex; align-items: center; justify-content: space-between;
             border-bottom: 1px solid #ccc; padding-bottom: 8px; }
    header a { font-size: 14px; padding: 6px 12px; border: 1px solid #888;
               border-radius: 8px; text-decoration: none; }
    #messages { margin: 16px 0; min-height: 320px; display: flex;
                flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; line-height: 1.5; }
    .user { align-self: flex-end; background: #2f6fed; color: #fff; white-space: pre-wrap; }
    .bot { align-self: flex-start; background: #eceef2; color: #111; }
    .blocked { align-self: flex-start; background: #fde2e2; color: #8a1f1f; }
    .msg h1, .msg h2, .msg h3 { font-size: 15px; margin: 8px 0 4px; }
    .msg p { margin: 6px 0; }
    .msg ul, .msg ol { margin: 6px 0; padding-left: 20px; }
    .msg code { background: rgba(0,0,0,0.08); padding: 1px 4px; border-radius: 4px;
                font-family: ui-monospace, monospace; }
    .msg pre { background: rgba(0,0,0,0.08); padding: 8px; border-radius: 8px;
               overflow-x: auto; }
    .msg pre code { background: none; padding: 0; }
    .msg hr { border: none; border-top: 1px solid #aaa; margin: 8px 0; }
    form { display: flex; gap: 8px; }
    input { flex: 1; padding: 10px; border: 1px solid #888; border-radius: 8px; }
    button { padding: 10px 16px; border: none; border-radius: 8px;
             background: #2f6fed; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <header>
    <h1>통합 어시스턴트</h1>
    <a href="/admin">관리자 페이지</a>
  </header>

  <div id="messages"></div>

  <form id="chat-form">
    <input id="msg" placeholder="질문을 입력하세요" autocomplete="off" />
    <button type="submit">보내기</button>
  </form>

  <script>
    const messages = document.getElementById("messages");

    // 모델 답이 마크다운이라 보기 좋게 HTML로 그린다. 외부 라이브러리 없이 흔한 문법만 다룬다.
    function escapeHtml(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function inline(s) {
      return s
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>");
    }
    function renderMarkdown(text) {
      const lines = escapeHtml(text).split("\n");
      const html = [];
      let listType = null, inCode = false, codeBuf = [];
      const closeList = () => {
        if (listType) { html.push("</" + listType + ">"); listType = null; }
      };
      for (const line of lines) {
        if (line.trim().startsWith("```")) {
          if (inCode) {
            html.push("<pre><code>" + codeBuf.join("\n") + "</code></pre>");
            codeBuf = []; inCode = false;
          } else { closeList(); inCode = true; }
          continue;
        }
        if (inCode) { codeBuf.push(line); continue; }
        if (/^\s*---\s*$/.test(line)) { closeList(); html.push("<hr>"); continue; }
        const h = line.match(/^(#{1,3})\s+(.*)$/);
        if (h) { closeList(); const n = h[1].length;
                 html.push(`<h${n}>${inline(h[2])}</h${n}>`); continue; }
        const ul = line.match(/^\s*[-*]\s+(.*)$/);
        if (ul) { if (listType !== "ul") { closeList(); html.push("<ul>"); listType = "ul"; }
                  html.push("<li>" + inline(ul[1]) + "</li>"); continue; }
        const ol = line.match(/^\s*\d+\.\s+(.*)$/);
        if (ol) { if (listType !== "ol") { closeList(); html.push("<ol>"); listType = "ol"; }
                  html.push("<li>" + inline(ol[1]) + "</li>"); continue; }
        if (line.trim() === "") { closeList(); continue; }
        closeList();
        html.push("<p>" + inline(line) + "</p>");
      }
      if (inCode) html.push("<pre><code>" + codeBuf.join("\n") + "</code></pre>");
      closeList();
      return html.join("\n");
    }

    function bubble(role) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    document.getElementById("chat-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const input = document.getElementById("msg");
      const text = input.value.trim();
      if (!text) return;
      bubble("user").textContent = text;
      input.value = "";

      const bot = bubble("bot");
      try {
        const res = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, user: "web" }),
        });
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let acc = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          acc += decoder.decode(value, { stream: true });
          if (acc.startsWith("[차단]")) bot.className = "msg blocked";
          bot.innerHTML = renderMarkdown(acc);
          messages.scrollTop = messages.scrollHeight;
        }
      } catch (err) {
        bot.className = "msg blocked";
        bot.textContent = "요청 실패: " + err;
      }
    });
  </script>
</body>
</html>
