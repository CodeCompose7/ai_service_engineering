<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>mini RAG</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.4rem; } h2 { font-size: 1.1rem; }
  section { margin: 1.5rem 0; padding: 1rem; border: 1px solid #ddd; border-radius: 8px; }
  input[type=text] { width: 68%; padding: .5rem; }
  button { padding: .5rem 1rem; cursor: pointer; }
  table { border-collapse: collapse; width: 100%; margin-top: .5rem; }
  th, td { border: 1px solid #ddd; padding: .4rem .6rem; text-align: left; font-size: .9rem; }
  .ans { background: #f6f8fa; padding: .8rem; border-radius: 6px; white-space: pre-wrap; }
  .src { font-size: .85rem; color: #444; margin: .3rem 0; }
  .muted { color: #888; font-size: .85rem; }
  .hit { color: #1a7f37; font-weight: bold; } .miss { color: #c0392b; font-weight: bold; }
</style>
</head>
<body>
<h1>mini RAG — 조회와 평가</h1>
<p class="muted">첫 요청은 임베딩 모델을 메모리에 올리느라 십수 초 걸립니다. 그 뒤로는 빠릅니다.</p>

<section>
  <h2>질문 조회</h2>
  <input type="text" id="q" placeholder="검색 증강 생성은 어떻게 동작하나요?" />
  <button onclick="runQuery()">검색·생성</button>
  <div id="qout"></div>
</section>

<section>
  <h2>EVAL_SET 평가</h2>
  <button onclick="runEval()">평가 실행</button>
  <div id="eout"></div>
</section>

<script>
async function runQuery() {
  const el = document.getElementById('q');
  const q = el.value || el.placeholder;
  const out = document.getElementById('qout');
  out.innerHTML = '<p class="muted">검색·생성 중…</p>';
  const d = await (await fetch('/api/query?q=' + encodeURIComponent(q))).json();
  let html = '<div class="ans">' + esc(d.answer) + '</div>';
  html += '<p class="muted">모델: ' + esc(d.model) + ' · 근거</p>';
  for (const s of d.sources) {
    const t = esc(s.text.slice(0, 120));
    html += '<div class="src">[' + s.rank + '] ' + s.similarity + ' · #' + s.chunk + ' — ' + t + '…</div>';
  }
  out.innerHTML = html;
}
async function runEval() {
  const out = document.getElementById('eout');
  out.innerHTML = '<p class="muted">평가 중…</p>';
  const d = await (await fetch('/api/eval')).json();
  let html = '<p>Hit Rate@' + d.k + ' = <b>' + d.hit_rate + '</b> · MRR = <b>' + d.mrr + '</b></p>';
  html += '<table><tr><th>질문</th><th>정답 문구</th><th>순위</th><th>적중</th></tr>';
  for (const r of d.rows) {
    const rank = r.rank ? r.rank + '위' : '없음';
    const hit = r.hit ? '<span class="hit">O</span>' : '<span class="miss">X</span>';
    html += '<tr><td>' + esc(r.q) + '</td><td>' + esc(r.answer) + '</td><td>' + rank + '</td><td>' + hit + '</td></tr>';
  }
  out.innerHTML = html + '</table>';
}
function esc(s) {
  return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
}
</script>
</body>
</html>
